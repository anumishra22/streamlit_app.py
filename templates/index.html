<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Bot Control Panel</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { color: #58a6ff; text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        .box { background: #161b22; padding: 20px; border-radius: 6px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        label { display: block; margin-top: 10px; color: #8b949e; font-size: 14px; }
        input, textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button, a { flex: 1; padding: 10px; text-align: center; border-radius: 4px; text-decoration: none; color: white; border: none; cursor: pointer; font-weight: bold; }
        .save-btn { background: #238636; }
        .start-btn { background: #1f6feb; }
        .stop-btn { background: #da3633; }
        
        /* LOG CONSOLE */
        #log-window { 
            background: #000; color: #00ff00; 
            height: 300px; overflow-y: scroll; 
            padding: 10px; border: 1px solid #30363d; 
            font-size: 12px; line-height: 1.4;
        }
        .log-entry { margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 FB Auto-Sender Bot</h2>

        <div class="box">
            <div class="btn-group">
                {% if not bot_running %}
                <a href="/start_sending" class="start-btn">▶ START BOT</a>
                {% else %}
                <a href="/stop_bot" class="stop-btn">⏹ STOP BOT</a>
                {% endif %}
            </div>
            <p style="text-align: center; font-size: 12px; margin-top: 5px;">
                Status: {% if bot_running %}<span style="color: #00ff00;">Running 🟢</span>{% else %}<span style="color: #da3633;">Stopped 🔴</span>{% endif %}
            </p>
        </div>

        <div class="box">
            <label>🖥️ LIVE LOGS:</label>
            <div id="log-window">Connecting to server...</div>
        </div>

        <div class="box">
            <form method="POST" enctype="multipart/form-data">
                <label>Thread ID (Target):</label>
                <input type="text" name="thread" value="{{ thread }}">
                
                <label>Message File (.txt):</label>
                <input type="file" name="message_file">
                <div style="font-size: 10px; color: #666;">Current: {{ message[:50] }}</div>

                <label>Speed (Seconds):</label>
                <input type="text" name="speed" value="{{ speed }}">

                <label>Cookies (Netscape/JSON):</label>
                <textarea name="cookies" rows="3">{{ cookies }}</textarea>

                <button type="submit" class="save-btn" style="width: 100%; margin-top: 10px;">💾 UPDATE SETTINGS</button>
            </form>
        </div>
    </div>

    <script>
        // Auto-scroll Logs
        function fetchLogs() {
            fetch('/logs')
                .then(response => response.json())
                .then(data => {
                    const logWindow = document.getElementById('log-window');
                    logWindow.innerHTML = data.map(line => `<div class="log-entry">${line}</div>`).join('');
                    logWindow.scrollTop = logWindow.scrollHeight; // Auto scroll to bottom
                });
        }
        // Refresh logs every 2 seconds
        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>
</html>
